[tools]
python = "3.14.3"
poetry = "latest"
github-cli = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[settings]
lockfile = true

[tasks.install]
description = "Install dependencies"
run = "poetry install"

[tasks.test]
description = "Run unit tests (no Docker, no external dependencies)"
run = "poetry run pytest tests/ --ignore=tests/e2e_sync/ --ignore=tests/e2e_sync_docker/ --ignore=tests/integration_docker/ --ignore=tests/integration_fs/ -v"

[tasks.test-e2e]
description = "Run end-to-end sync tests (Docker + local)"
run = "poetry run pytest tests/e2e_sync/ tests/e2e_sync_docker/ -v"

[tasks.test-integration]
description = "Run all integration tests (Docker + filesystem)"
run = "poetry run pytest tests/integration_docker/ tests/integration_fs/ -v"

[tasks.test-integration-docker]
description = "Run all Docker-based tests (e2e + integration)"
run = "poetry run pytest tests/e2e_sync_docker/ tests/integration_docker/ -v"

[tasks.test-integration-fs]
description = "Run filesystem integration tests"
run = "poetry run pytest tests/integration_fs/ -v"

[tasks.test-btrfs-local]
description = "Run local btrfs tests inside Docker (privileged)"
run = """
docker build -t nbkp-btrfs-test -f nbkp/testkit/dockerbuild/Dockerfile.btrfs-local-test .
docker run --rm --privileged -v $(pwd):/app -w /app nbkp-btrfs-test \
  poetry run pytest tests/integration_docker/test_btrfs_local.py -v
"""

[tasks.test-all]
description = "Run all tests"
run = "poetry run pytest tests/ -v"

[tasks.format]
description = "Format code with black"
run = "poetry run black ."

[tasks.lint]
description = "Run flake8 linting"
run = "poetry run flake8 nbkp/ tests/"

[tasks.type-check]
description = "Run mypy type checking"
run = "poetry run mypy nbkp/"

[tasks.check]
description = "Run all checks (format, lint, type-check, test)"
depends = ["format", "lint", "type-check", "test"]

[tasks.clean]
description = "Clean up build artifacts"
run = """
rm -rf build/ dist/ *.egg-info/
find . -type d -name __pycache__ -delete
find . -type f -name "*.pyc" -delete
"""

[tasks.build]
description = "Build the package"
run = "poetry build"

[tasks.publish]
description = "Publish to PyPI (requires authentication)"
run = "poetry publish"

[tasks.example]
description = "Run the basic usage example"
run = "poetry run python examples/basic_usage.py"

[tasks.shell]
description = "Start a Poetry shell"
run = "poetry shell"


# Tasks used by CI workflows
[tasks.ci-test]
description = "Run all checks needed on CI"
run = [
  {task = "install"},
  {task = "build"},
  {task = "test-all"},
]

[tasks.ci-build]
description = "Run all checks needed on CI"
run = [
  {task = "install"},
  {task = "build"},
]

